function rC(b,i){const a=cA(b),pI=b.pl==="blogspot"?"🅱️":"🅣",pCl=b.pl==="tistory"?" tistory":"",sD=b.ok?"🟢":"🔴";let fC="fill-blue";if(a.pct>=100)fC="fill-green";else if(a.pct>=70)fC="fill-orange";let dd="";if(a.rem>0)dd=`<div class="dday-box"><div class="dday-num dday-blue">D-${a.est}</div><div class="dday-label">신청까지 (예상 ${fFD(a.aD)})</div></div>`;else if(a.posts<G+10)dd=`<div class="dday-box"><div class="dday-num dday-green">✅ 신청 가능!</div><div class="dday-label">지금 AdSense 신청하세요</div></div>`;else dd=`<div class="dday-box"><div class="dday-num dday-orange">승인 대기</div><div class="dday-label">예상: ${fFD(a.apD)}</div></div>`;

return`<div class="adsense-card" style="animation-delay:${i*.05}s" data-pl="${b.pl}" data-ph="${a.ph}"><div class="ac-header"><div class="ac-name">${pI} ${b.name} ${sD}</div><span class="ac-platform${pCl}">${b.pl}</span></div><a href="${b.bu}" target="_blank" class="ac-url">${b.bu}</a><span class="phase-badge ${a.pc}">${a.pi} ${a.ph}</span><div class="ac-progress"><div class="ac-progress-header"><span class="ac-progress-label">AdSense (${G}개)</span><span class="ac-progress-val">${a.posts}/${G} (${a.pct}%)</span></div><div class="ac-progress-track"><div class="ac-progress-fill ${fC}" style="width:${a.pct}%"></div></div></div><div class="ac-stats"><div class="ac-stat"><span class="ac-stat-num" style="color:var(--green)">${a.posts}</span><div class="ac-stat-label">포스트</div></div><div class="ac-stat"><span class="ac-stat-num" style="color:${a.rem>0?"var(--orange)":"var(--green)"}">${a.rem>0?a.rem:"✓"}</span><div class="ac-stat-label">${a.rem>0?"남은 글":"달성!"}</div></div><div class="ac-stat"><span class="ac-stat-num" style="color:var(--blue)">${a.av.toFixed(1)}</span><div class="ac-stat-label">일평균</div></div><div class="ac-stat"><span class="ac-stat-num" style="color:var(--accent2)">D-${a.est||0}</span><div class="ac-stat-label">신청까지</div></div></div>${dd}<div class="ac-posts-toggle" onclick="this.nextElementSibling.classList.toggle('open');this.textContent=this.nextElementSibling.classList.contains('open')?'▲ 접기':'▼ 최근 글 보기'">▼ 최근 글 보기</div><div class="ac-posts-list">${pH||'<div style="padding:12px;text-align:center;color:var(--text3);font-size:12px">포스트 없음</div>'}</div></div>`}
function rAll(){let f=D;if(cF==="blogspot")f=f.filter(b=>b.pl==="blogspot");else if(cF==="tistory")f=f.filter(b=>b.pl==="tistory");else if(cF==="ready")f=f.filter(b=>cA(b).pct>=100);else if(cF==="almost")f=f.filter(b=>{const p=cA(b).pct;return p>=70&&p<100});else if(cF==="building")f=f.filter(b=>cA(b).pct<70);f.sort((a,b)=>(b.pc||0)-(a.pc||0));document.getElementById("grid").innerHTML=f.map((b,i)=>rC(b,i)).join("");
const tot=D.length,tp=D.reduce((s,b)=>s+(b.pc||0),0),td=D.reduce((s,b)=>s+b.ps.filter(p=>isT(p.d)).length,0),ar=D.filter(b=>cA(b).pct>=100).length;
aN("sB",tot);aN("sP",tp);aN("sT",td);aN("sR",ar);aN("sA",0);
const avg=D.length?Math.round(D.reduce((s,b)=>s+cA(b).pct,0)/D.length):0;document.getElementById("mP").textContent=avg+"%";document.getElementById("mF").style.width=avg+"%";
const avgP=D.length?Math.round(tp/D.length):0;document.getElementById("s1").textContent=`평균 ${avgP}/${G}`;let cs=1;if(avgP>=G)cs=3;else if(avgP>=G*.7)cs=2;if(ar>0){cs=Math.max(cs,3);document.getElementById("s3").textContent=ar+"개 준비"}else{const fast=D.reduce((m,b)=>{const s=cA(b);return s.est<m?s.est:m},999);document.getElementById("s3").textContent=fast<999?"D-"+fast:"D-??"}
document.querySelectorAll(".step").forEach((s,i)=>{s.classList.remove("done","active","locked");if(i+1<cs)s.classList.add("done");else if(i+1===cs)s.classList.add("active");else s.classList.add("locked")});
document.getElementById("oP").textContent=["콘텐츠 축적 중","품질 점검 중","신청 준비 완료","심사 대기","승인 완료","수익 발생"][cs-1]||"";
document.getElementById("lastUp").textContent="최종: "+new Date().toLocaleTimeString("ko-KR")}
function aN(id,t){const e=document.getElementById(id);const c=parseInt(e.textContent)||0;if(c===t){e.textContent=t;return}const s=Math.max(1,Math.floor(Math.abs(t-c)/12));let v=c;const ti=setInterval(()=>{v+=v<t?s:-s;if((s>0&&v>=t)||(s<0&&v<=t)){v=t;clearInterval(ti)}e.textContent=v},30)}
function sT(m){const t=document.getElementById("toast");t.textContent=m;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),3000)}
document.querySelector(".filter-bar")?.addEventListener("click",e=>{if(!e.target.classList.contains("filter-tab"))return;document.querySelectorAll(".filter-tab").forEach(t=>t.classList.remove("active"));e.target.classList.add("active");cF=e.target.dataset.filter;rAll()});
async function loadAll(){const ps=[...BLOGS.blogspot.map(fBS),...BLOGS.tistory.map(fTS)];D=(await Promise.allSettled(ps)).filter(r=>r.status==="fulfilled").map(r=>r.value);rAll();const o=document.getElementById("lo");o.classList.add("hide");setTimeout(()=>o.style.display="none",500)}
async function refreshAll(){document.querySelector(".refresh-btn").classList.add("loading");const ps=[...BLOGS.blogspot.map(fBS),...BLOGS.tistory.map(fTS)];D=(await Promise.allSettled(ps)).filter(r=>r.status==="fulfilled").map(r=>r.value);rAll();document.querySelector(".refresh-btn").classList.remove("loading");sT("✅ 새로고침 완료!")}
setInterval(refreshAll,3e5);loadAll();
</script></body></html>
